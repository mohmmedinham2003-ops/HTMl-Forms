<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>

<body style="background-color: cadetblue;">
    <h1 style="text-align: center;background-color: rgb(52, 20, 168); color: aliceblue;">Student Registration Forms</h1>



    <table style="background-color: brown; margin-left: 200px; padding: 50px;">
        <tr>
            <td>Username:</td>
            <td><input style="border-radius: px; padding: 10px;" type="text" placeholder="Student name">
            </td>
        </tr>

        <tr>
            <td>PhoneNumber:</td>
            <td><input style="border-radius: px; padding: 10px;" type="number" placeholder="number">
            </td>

        </tr>

        <tr>
            <td>Email:</td>
            <td><input style="border-radius: px; padding: 10px;" type="email" placeholder="Email">
            </td>
        </tr>

        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" value="Male">Male
                <input type="radio" value="Female">Female
            </td>
        </tr>


        <tr>
            <td>Courses:</td>
            <td><select name="Courses" id="">
                <option value="PHD">Male</option>
                <option value="Eng">Female</option>
                </select>
            </td>
        </tr>

    

        <tr>
            <td>Registration date:</td>
            <td><input style="border-radius: px; padding: 10px;" type="date" placeholder="reg date">
            </td>


        </tr>


    </table>
</body>

</html>
